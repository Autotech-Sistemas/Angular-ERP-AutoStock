name: Continuous Integration with Github Actions

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

jobs:
  build:
    permissions:
      write-all
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular App
        run: npm run build --prod

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
            echo "IS_RELEASE=true" >> $GITHUB_OUTPUT
          else
            echo "VERSION=latest" >> $GITHUB_OUTPUT
            echo "IS_RELEASE=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/angular-autostock:latest .

      - name: Push latest to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/angular-autostock:latest

      - name: Push versioned tag to Docker Hub
        if: steps.version.outputs.IS_RELEASE == 'true'
        run: |
          docker tag ${{ secrets.DOCKER_USERNAME }}/angular-autostock:latest ${{ secrets.DOCKER_USERNAME }}/angular-autostock:${{ steps.version.outputs.VERSION }}
          docker push ${{ secrets.DOCKER_USERNAME }}/angular-autostock:${{ steps.version.outputs.VERSION }}
